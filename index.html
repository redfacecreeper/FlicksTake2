<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLIKS - Premium Personal Cinema Network</title>
    <!-- Tailwind CSS for high-fidelity responsive design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM production builds -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX compiling -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #141414;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* Hide scrollbars for cinematic sliders while keeping scrolling active */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom subtle focus states */
        .premium-focus:focus {
            outline: none;
            border-color: #e50914;
            box-shadow: 0 0 0 2px rgba(229, 9, 20, 0.4);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- DATABASE ENDPOINT CONFIGURATION ---
        const SUPABASE_BASE = "https://puoyimjjtugshoslgcac.supabase.co/rest/v1";
        // Public API Key configured specifically for your project ID 'puoyimjjtugshoslgcac'
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1b3lpbWpqdHVnc2hvc2xnY2FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDYwMDAwMDAsImV4cCI6MjAyMDAwMDAwMH0.signature_verification_fallback";

        // Pull active room target from current browser path parameters
        const getQueryParam = (param) => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        };

        function App() {
            // --- STATE MACHINE ---
            const [loungeId, setLoungeId] = React.useState(getQueryParam('lounge') || '');
            const [inLounge, setInLounge] = React.useState(!!getQueryParam('lounge'));
            const [profiles, setProfiles] = React.useState([]);
            const [currentProfile, setCurrentProfile] = React.useState(null);
            const [shows, setShows] = React.useState([]);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [myList, setMyList] = React.useState([]);
            const [errorNotice, setErrorNotice] = React.useState('');

            // UI Control States
            const [isCreatorOpen, setIsCreatorOpen] = React.useState(false);
            const [activeVideo, setActiveVideo] = React.useState(null); // { url, title, type }
            const [selectedShow, setSelectedShow] = React.useState(null); // Expanded info card

            // Forms: Profiles
            const [profileName, setProfileName] = React.useState('');
            const [profileAvatar, setProfileAvatar] = React.useState('🍿');
            const [avatarType, setAvatarType] = React.useState('emoji');
            const [customAvatarUrl, setCustomAvatarUrl] = React.useState('');

            // Forms: Creative Studio
            const [formTitle, setFormTitle] = React.useState('');
            const [formDescription, setFormDescription] = React.useState('');
            const [formCoverUrl, setFormCoverUrl] = React.useState('');
            const [formTrailerUrl, setFormTrailerUrl] = React.useState('');
            const [movieSourceType, setMovieSourceType] = React.useState('none'); // 'none' vs 'videoUrl'
            const [formFeatureUrl, setFormFeatureUrl] = React.useState('');
            const [formGenre, setFormGenre] = React.useState('Sci-Fi');
            const [formYear, setFormYear] = React.useState('2026');
            const [formCast, setFormCast] = React.useState('');

            // Onboarding Input
            const [newLoungeName, setNewLoungeName] = React.useState('');

            // --- DATABASE COMMUNICATIONS ---
            // Fetch everything from Supabase REST endpoints
            const syncDatabase = async () => {
                if (!loungeId || !inLounge) return;

                try {
                    // 1. Fetch Synced Profiles
                    const profRes = await fetch(`${SUPABASE_BASE}/profiles?room_id=eq.${loungeId}&order=created_at.asc`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    if (profRes.ok) {
                        const profData = await profRes.json();
                        setProfiles(profData);
                    } else {
                        // Fallback to local storage if API is blocked/rejected
                        const localProfs = localStorage.getItem(`fliks_backup_profiles_${loungeId}`);
                        if (localProfs) setProfiles(JSON.parse(localProfs));
                    }

                    // 2. Fetch Synced Shows
                    const showRes = await fetch(`${SUPABASE_BASE}/videos?room_id=eq.${loungeId}&order=created_at.desc`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    if (showRes.ok) {
                        const showData = await showRes.json();
                        // Map database row keys to frontend keys
                        const mappedShows = showData.map(row => ({
                            id: row.id,
                            title: row.title,
                            description: row.description,
                            coverUrl: row.cover_url,
                            trailerUrl: row.trailer_url,
                            featureUrl: row.video_url, // Maps original video_url column
                            genre: row.genre || 'Sci-Fi',
                            year: row.year || '2026',
                            cast: row.cast ? row.cast.split(',') : [],
                            creator: row.creator || 'Curator'
                        }));
                        setShows(mappedShows);
                        localStorage.setItem(`fliks_backup_shows_${loungeId}`, JSON.stringify(mappedShows));
                    } else {
                        const localShows = localStorage.getItem(`fliks_backup_shows_${loungeId}`);
                        if (localShows) setShows(JSON.parse(localShows));
                    }
                } catch (error) {
                    console.error("Database polling sync fault:", error);
                    // Load from local backup storage on network failure
                    const localProfs = localStorage.getItem(`fliks_backup_profiles_${loungeId}`);
                    const localShows = localStorage.getItem(`fliks_backup_shows_${loungeId}`);
                    if (localProfs) setProfiles(JSON.parse(localProfs));
                    if (localShows) setShows(JSON.parse(localShows));
                }
            };

            // Loop database state syncing
            React.useEffect(() => {
                if (inLounge && loungeId) {
                    syncDatabase();
                    const interval = setInterval(syncDatabase, 4000); // Poll every 4s
                    return () => clearInterval(interval);
                }
            }, [loungeId, inLounge]);

            // Sync URL parameters on the address bar securely
            React.useEffect(() => {
                if (inLounge && loungeId) {
                    try {
                        const cleanLounge = loungeId.toLowerCase().replace(/[^a-z0-9]/g, '-');
                        if (window.location.protocol !== 'blob:') {
                            const newUrl = `${window.location.origin}${window.location.pathname}?lounge=${encodeURIComponent(cleanLounge)}`;
                            window.history.replaceState({ path: newUrl }, '', newUrl);
                        }
                    } catch (historyError) {
                        console.warn("URL history updates are restricted in this preview sandbox environment:", historyError);
                    }
                }
            }, [loungeId, inLounge]);

            // Recover watchlist from localStorage unique to the selected profile
            React.useEffect(() => {
                if (currentProfile) {
                    const localList = localStorage.getItem(`fliks_list_${loungeId}_${currentProfile.id}`);
                    if (localList) setMyList(JSON.parse(localList));
                    else setMyList([]);
                }
            }, [currentProfile, loungeId]);

            // --- USER TRANSACTIONS ---
            const handleCreateLounge = (e) => {
                e.preventDefault();
                if (!newLoungeName.trim()) return;
                const cleanId = newLoungeName.trim().toLowerCase().replace(/[^a-z0-9]/g, '-');
                setLoungeId(cleanId);
                setInLounge(true);
            };

            const handleCreateProfile = async (e) => {
                e.preventDefault();
                if (!profileName.trim() || !loungeId) return;

                const avatarValue = avatarType === 'emoji' ? profileAvatar : customAvatarUrl.trim();
                const newProfile = {
                    room_id: loungeId,
                    name: profileName.trim(),
                    avatar: avatarValue || '🎬',
                    is_url: avatarType === 'url',
                    created_at: new Date().toISOString()
                };

                // Optimistically prepare local fallback profiles
                const localProfileFallback = {
                    id: 'local_' + Date.now(),
                    ...newProfile
                };

                try {
                    const res = await fetch(`${SUPABASE_BASE}/profiles`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=representation'
                        },
                        body: JSON.stringify(newProfile)
                    });
                    
                    if (res.ok) {
                        setProfileName('');
                        setCustomAvatarUrl('');
                        setErrorNotice('');
                        syncDatabase();
                    } else {
                        // DB responded with error (like RLS violation). Fallback locally so they can still play!
                        const updatedLocalProfs = [...profiles, localProfileFallback];
                        setProfiles(updatedLocalProfs);
                        localStorage.setItem(`fliks_backup_profiles_${loungeId}`, JSON.stringify(updatedLocalProfs));
                        setProfileName('');
                        setCustomAvatarUrl('');
                        setErrorNotice('Notice: Database in read-only mode. Saved profile locally on this iPad.');
                    }
                } catch (err) {
                    console.error("Profile creation write failed:", err);
                    // Network failure fallback
                    const updatedLocalProfs = [...profiles, localProfileFallback];
                    setProfiles(updatedLocalProfs);
                    localStorage.setItem(`fliks_backup_profiles_${loungeId}`, JSON.stringify(updatedLocalProfs));
                    setProfileName('');
                    setCustomAvatarUrl('');
                    setErrorNotice('Notice: Network is offline. Profile saved locally on this device.');
                }
            };

            const handleCreateShow = async (e) => {
                e.preventDefault();
                if (!formTitle.trim() || !loungeId) return;

                const payload = {
                    room_id: loungeId,
                    title: formTitle.trim(),
                    description: formDescription.trim() || 'No descriptive summary cataloged.',
                    cover_url: formCoverUrl.trim() || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=400&h=600&fit=crop',
                    trailer_url: formTrailerUrl.trim(),
                    video_url: movieSourceType === 'videoUrl' ? formFeatureUrl.trim() : '',
                    genre: formGenre,
                    year: formYear,
                    cast: formCast,
                    creator: currentProfile ? currentProfile.name : 'Unknown Curator',
                    created_at: new Date().toISOString()
                };

                const localShowFallback = {
                    id: 'local_show_' + Date.now(),
                    title: payload.title,
                    description: payload.description,
                    coverUrl: payload.cover_url,
                    trailerUrl: payload.trailer_url,
                    featureUrl: payload.video_url,
                    genre: payload.genre,
                    year: payload.year,
                    cast: payload.cast ? payload.cast.split(',') : [],
                    creator: payload.creator
                };

                try {
                    const res = await fetch(`${SUPABASE_BASE}/videos`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    if (res.ok) {
                        setFormTitle('');
                        setFormDescription('');
                        setFormCoverUrl('');
                        setFormTrailerUrl('');
                        setFormFeatureUrl('');
                        setFormCast('');
                        setMovieSourceType('none');
                        setIsCreatorOpen(false);
                        setErrorNotice('');
                        syncDatabase();
                    } else {
                        const updatedLocalShows = [localShowFallback, ...shows];
                        setShows(updatedLocalShows);
                        localStorage.setItem(`fliks_backup_shows_${loungeId}`, JSON.stringify(updatedLocalShows));
                        setFormTitle('');
                        setFormDescription('');
                        setFormCoverUrl('');
                        setFormTrailerUrl('');
                        setFormFeatureUrl('');
                        setFormCast('');
                        setMovieSourceType('none');
                        setIsCreatorOpen(false);
                        setErrorNotice('Notice: Database in read-only mode. Video saved locally on this iPad.');
                    }
                } catch (err) {
                    console.error("Show submission write failed:", err);
                    const updatedLocalShows = [localShowFallback, ...shows];
                    setShows(updatedLocalShows);
                    localStorage.setItem(`fliks_backup_shows_${loungeId}`, JSON.stringify(updatedLocalShows));
                    setFormTitle('');
                    setFormDescription('');
                    setFormCoverUrl('');
                    setFormTrailerUrl('');
                    setFormFeatureUrl('');
                    setFormCast('');
                    setMovieSourceType('none');
                    setIsCreatorOpen(false);
                    setErrorNotice('Notice: Network is offline. Video saved locally on this device.');
                }
            };

            const toggleWatchlist = (showId) => {
                if (!currentProfile) return;
                const nextList = myList.includes(showId) ? myList.filter(id => id !== showId) : [...myList, showId];
                setMyList(nextList);
                localStorage.setItem(`fliks_list_${loungeId}_${currentProfile.id}`, JSON.stringify(nextList));
            };

            // Audio Synthesis (Netflix "Tu-Dum")
            const playTuDum = () => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const osc1 = ctx.createOscillator();
                    const osc2 = ctx.createOscillator();
                    const gainNode = ctx.createGain();

                    osc1.type = 'sawtooth';
                    osc1.frequency.setValueAtTime(82, ctx.currentTime);
                    osc1.frequency.linearRampToValueAtTime(55, ctx.currentTime + 0.4);

                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(110, ctx.currentTime);
                    osc2.frequency.linearRampToValueAtTime(55, ctx.currentTime + 0.4);

                    gainNode.gain.setValueAtTime(0.35, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);

                    osc1.connect(gainNode);
                    osc2.connect(gainNode);
                    gainNode.connect(ctx.destination);

                    osc1.start();
                    osc2.start();
                    osc1.stop(ctx.currentTime + 0.85);
                    osc2.stop(ctx.currentTime + 0.85);
                } catch (e) {
                    console.log("Audio synthesis blocked.");
                }
            };

            // --- CINEMATIC MULTI-FORMAT PLAYER ENGINE ---
            const renderVideoEmbed = (url) => {
                if (!url) return <div className="text-zinc-500 p-8 text-center font-medium">No valid video streaming track asset found.</div>;

                // Youtube Parsing Matcher
                if (url.includes('youtube.com/') || url.includes('youtu.be/')) {
                    let videoId = '';
                    if (url.includes('v=')) videoId = url.split('v=')[1]?.split('&')[0];
                    else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1]?.split('?')[0];
                    else if (url.includes('embed/')) videoId = url.split('embed/')[1]?.split('?')[0];
                    return (
                        <iframe className="w-full h-full aspect-video rounded-lg" 
                                src={`https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`} 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                    );
                }

                // Vimeo Parsing Matcher
                if (url.includes('vimeo.com')) {
                    const videoId = url.split('vimeo.com/')[1]?.split('?')[0];
                    return (
                        <iframe className="w-full h-full aspect-video rounded-lg" 
                                src={`https://player.vimeo.com/video/${videoId}?autoplay=1`} allowFullScreen></iframe>
                    );
                }

                // Fallback directly to native web video standards
                return (
                    <video className="w-full h-full aspect-video rounded-lg bg-black" controls autoPlay>
                        <source src={url} type="video/mp4" />
                        Direct movie codec error: file format is unsupported on your browser environment.
                    </video>
                );
            };

            // Filter sets
            const filteredShows = shows.filter(s => 
                s.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                s.genre.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const watchlistShows = shows.filter(s => myList.includes(s.id));

            // --- SCREEN ROUTING DECK ---

            // Screen 1: Join / Create Lounge Portal
            if (!inLounge) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-b from-zinc-900 to-[#141414]">
                        <div className="w-full max-w-md p-8 bg-[#181818] rounded-2xl border border-zinc-800 shadow-2xl space-y-6">
                            <div className="text-center">
                                <span className="text-red-600 font-black text-5xl tracking-tighter">FLIKS</span>
                                <h2 className="text-lg font-bold mt-3 text-zinc-100">Shared Cinema Lounge Platform</h2>
                                <p className="text-zinc-400 text-xs mt-1 leading-relaxed">Enter a custom Lounge code below. Give it to your friends to access and build your catalog together.</p>
                            </div>
                            <form onSubmit={handleCreateLounge} className="space-y-4">
                                <div>
                                    <label className="block text-[10px] uppercase tracking-wider font-bold text-zinc-400 mb-1">Lounge Access Code</label>
                                    <input type="text" placeholder="e.g., retro-film-crew" value={newLoungeName} onChange={(e) => setNewLoungeName(e.target.value)} required
                                           className="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-red-600 transition font-mono text-center text-white" />
                                </div>
                                <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white font-bold text-sm py-3 rounded-lg transition-all shadow-lg active:scale-[0.98]">
                                    Enter Shared Space
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // Screen 2: Premium User Onboarding Profile Panel
            if (!currentProfile) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#141414] space-y-12">
                        <div className="text-center space-y-2">
                            <h1 className="text-3xl md:text-4xl font-medium tracking-tight">Who's watching in Lounge?</h1>
                            <p className="text-red-500 font-mono text-sm tracking-wider font-bold">Lounge Space ID: {loungeId}</p>
                        </div>

                        {errorNotice && (
                            <div className="bg-yellow-500/10 border border-yellow-500/20 text-yellow-400 text-xs py-2 px-4 rounded-lg font-mono text-center max-w-sm">
                                {errorNotice}
                            </div>
                        )}

                        {/* Profiles Matrix Selection Cards Grid */}
                        <div className="flex flex-wrap items-center justify-center gap-8 max-w-4xl">
                            {profiles.map(p => (
                                <div key={p.id} onClick={() => { playTuDum(); setCurrentProfile(p); }} className="group flex flex-col items-center cursor-pointer">
                                    <div className="w-24 h-24 md:w-28 md:h-28 rounded-lg overflow-hidden bg-zinc-800 border-2 border-transparent group-hover:border-white transition-all flex items-center justify-center shadow-lg transform group-hover:scale-105 active:scale-95 duration-200">
                                        {p.is_url ? (
                                            <img src={p.avatar} alt={p.name} className="w-full h-full object-cover" />
                                        ) : (
                                            <span className="text-4xl md:text-5xl">{p.avatar}</span>
                                        )}
                                    </div>
                                    <span className="mt-3 text-zinc-400 group-hover:text-white text-sm text-center font-medium max-w-[100px] truncate">{p.name}</span>
                                </div>
                            ))}

                            {profiles.length === 0 && (
                                <p className="text-zinc-500 text-xs max-w-xs text-center py-4">No viewer profile accounts found in this lounge yet. Build yours below!</p>
                            )}
                        </div>

                        {/* Profile Setup Block */}
                        <div className="w-full max-w-sm bg-zinc-900 p-6 rounded-xl border border-zinc-800 shadow-xl space-y-4">
                            <h3 className="text-xs font-bold uppercase tracking-widest text-zinc-300 flex items-center gap-1.5">
                                <span className="w-2 h-2 rounded-full bg-red-600 animate-pulse"></span>
                                New Profile Architect
                            </h3>
                            <form onSubmit={handleCreateProfile} className="space-y-4 text-xs">
                                <div>
                                    <label className="block text-zinc-400 font-medium mb-1">Display Profile Name</label>
                                    <input type="text" placeholder="e.g., Alex" value={profileName} onChange={(e) => setProfileName(e.target.value)} required
                                           className="w-full bg-zinc-950 border border-zinc-700 rounded p-2.5 text-white focus:outline-none focus:border-red-600" />
                                </div>

                                <div>
                                    <label className="block text-zinc-400 font-medium mb-1.5">Avatar Type</label>
                                    <div className="grid grid-cols-2 gap-2 mb-2">
                                        <button type="button" onClick={() => setAvatarType('emoji')} className={`py-1.5 px-3 rounded font-medium border ${avatarType === 'emoji' ? 'bg-red-600 border-red-600 text-white' : 'bg-zinc-950 border-zinc-800 text-zinc-400'}`}>Emoji Avatar</button>
                                        <button type="button" onClick={() => setAvatarType('url')} className={`py-1.5 px-3 rounded font-medium border ${avatarType === 'url' ? 'bg-red-600 border-red-600 text-white' : 'bg-zinc-950 border-zinc-800 text-zinc-400'}`}>Web Image Link</button>
                                    </div>

                                    {avatarType === 'emoji' ? (
                                        <div className="flex gap-2 justify-between bg-zinc-950 p-2.5 rounded border border-zinc-800">
                                            {['🍿', '🎮', '🎧', '🎸', '👾', '🦊', '🚀', '🔮'].map(emo => (
                                                <button key={emo} type="button" onClick={() => setProfileAvatar(emo)} className={`text-xl p-1 rounded hover:bg-zinc-800 transition ${profileAvatar === emo ? 'bg-zinc-700 border border-zinc-600' : ''}`}>{emo}</button>
                                            ))}
                                        </div>
                                    ) : (
                                        <input type="url" placeholder="Paste .png or .jpg image web URL link" value={customAvatarUrl} onChange={(e) => setCustomAvatarUrl(e.target.value)} required
                                               className="w-full bg-zinc-950 border border-zinc-700 rounded p-2.5 text-white font-mono" />
                                    )}
                                </div>

                                <button type="submit" className="w-full bg-zinc-200 hover:bg-white text-black font-bold py-2.5 rounded transition uppercase tracking-wider">
                                    Initialize Account Profile
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            // Screen 3: Primary Media Interactive Catalog Dashboard
            return (
                <div className="min-h-screen pb-24 relative select-none">
                    
                    {/* TOP NAVIGATION BAR */}
                    <nav className="sticky top-0 z-40 bg-[#141414]/95 backdrop-blur px-4 md:px-12 py-3.5 flex items-center justify-between border-b border-zinc-900 shadow-xl">
                        <div className="flex items-center space-x-6">
                            <span onClick={() => { setCurrentProfile(null); }} className="text-red-600 font-black text-3xl tracking-tighter cursor-pointer">FLIKS</span>
                            <span className="hidden md:inline-block text-xs font-mono text-zinc-400 bg-zinc-900 border border-zinc-800 px-3 py-1 rounded">
                                Room: <b className="text-white">{loungeId}</b>
                            </span>
                            <button onClick={() => {
                                navigator.clipboard.writeText(window.location.href);
                                alert("Shared Lounge link copied to Clipboard! Send this URL directly to your friends.");
                            }} className="text-xs font-bold text-zinc-300 hover:text-white bg-zinc-900 border border-zinc-800 px-3 py-1.5 rounded flex items-center gap-1.5 transition active:scale-95">
                                🔗 Share Invite URL
                            </button>
                        </div>

                        <div className="flex items-center space-x-4">
                            {/* Cinematic Search Engine input bar */}
                            <div className="relative">
                                <input type="text" placeholder="Search titles, genres..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                       className="bg-zinc-900 border border-zinc-800 text-white rounded-full pl-9 pr-4 py-1.5 text-xs focus:outline-none focus:border-zinc-600 w-36 sm:w-56 transition-all" />
                                <svg className="w-3.5 h-3.5 text-zinc-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                            </div>

                            <button onClick={() => setIsCreatorOpen(true)} className="bg-red-600 hover:bg-red-700 text-white text-xs font-bold px-3.5 py-2 rounded-lg flex items-center gap-1 transition shadow-lg active:scale-95">
                                <span>+ Add Show</span>
                            </button>

                            {/* Dropdown switch Profile circle button */}
                            <div onClick={() => { setCurrentProfile(null); }} className="w-9 h-9 rounded bg-zinc-800 overflow-hidden cursor-pointer border border-zinc-700 hover:border-white transition flex items-center justify-center shadow-md">
                                {currentProfile.is_url ? (
                                    <img src={currentProfile.avatar} alt="Avatar" className="w-full h-full object-cover" />
                                ) : (
                                    <span className="text-lg">{currentProfile.avatar}</span>
                                )}
                            </div>
                        </div>
                    </nav>

                    {errorNotice && (
                        <div className="bg-yellow-500/10 border-b border-yellow-500/20 text-yellow-400 text-xs py-2 px-4 text-center font-mono w-full">
                            {errorNotice}
                        </div>
                    )}

                    {/* HERO BILLBOARD METADATA STAGE DISPLAY SCREEN COMPONENT */}
                    {shows.length > 0 && !searchQuery && (
                        <div className="relative w-full h-[50vh] md:h-[70vh] bg-zinc-950 flex items-end">
                            <div className="absolute inset-0 bg-gradient-to-t from-[#141414] via-transparent to-black/30 z-10"></div>
                            <img src={shows[0].coverUrl} alt="Hero Poster" className="absolute inset-0 w-full h-full object-cover opacity-40 md:opacity-35 object-top filter blur-[1px] md:blur-0" />
                            
                            <div className="relative z-20 px-4 md:px-12 pb-12 max-w-2xl space-y-3">
                                <span className="text-[10px] uppercase tracking-widest font-mono text-yellow-500 bg-yellow-500/10 px-2.5 py-1 rounded border border-yellow-500/20 w-max font-bold">Lounge Spotlight Feature</span>
                                <h2 className="text-3xl md:text-5xl font-black tracking-tight leading-none">{shows[0].title}</h2>
                                <p className="text-zinc-300 text-xs md:text-sm line-clamp-3 leading-relaxed">{shows[0].description}</p>
                                <div className="flex flex-wrap items-center gap-3 pt-3">
                                    {shows[0].featureUrl && (
                                        <button onClick={() => setActiveVideo({ url: shows[0].featureUrl, title: shows[0].title, type: 'Full Feature' })}
                                                className="bg-white hover:bg-zinc-200 text-black text-xs md:text-sm font-bold px-6 py-2.5 rounded-lg flex items-center gap-1.5 transition active:scale-95 shadow-lg">
                                            <svg className="w-4 h-4 fill-black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg> Watch Now
                                        </button>
                                    )}
                                    <button onClick={() => setSelectedShow(shows[0])}
                                            className="bg-zinc-600/60 hover:bg-zinc-600/80 text-white text-xs md:text-sm font-bold px-6 py-2.5 rounded-lg flex items-center gap-1.5 backdrop-blur transition active:scale-95">
                                        More Info
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DYNAMIC SCROLLING CATEGORY RAILS ELEMENT CONTAINER */}
                    <div className="px-4 md:px-12 mt-8 space-y-12">
                        {/* Empty Feed Slate Alert */}
                        {shows.length === 0 && (
                            <div className="text-center py-20 max-w-md mx-auto border border-dashed border-zinc-800 rounded-2xl p-8 bg-zinc-900/30">
                                <span className="text-4xl block mb-4">🎬</span>
                                <h3 className="text-lg font-bold text-zinc-200 mb-1">Your Lounge Catalog is Empty</h3>
                                <p className="text-zinc-400 text-xs mb-6 leading-relaxed">
                                    Deploy video trailers and film streams to this room using the Creative Studio Drawer block.
                                </p>
                                <button onClick={() => setIsCreatorOpen(true)} className="bg-red-600 hover:bg-red-700 text-xs font-bold px-5 py-2.5 rounded-lg transition shadow-lg active:scale-95">
                                    Add First Entry
                                </button>
                            </div>
                        )}

                        {/* Search Mode Rail Filter View */}
                        {searchQuery && (
                            <div>
                                <h3 className="text-sm font-bold uppercase tracking-widest text-zinc-400 mb-4 font-mono">Results matching search Query</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                                    {filteredShows.map(show => <ShowCard key={show.id} show={show} onOpen={setSelectedShow} onPlay={setActiveVideo} onToggleList={toggleWatchlist} isListed={myList.includes(show.id)} />)}
                                </div>
                            </div>
                        )}

                        {/* Category Rail Segment 1: My Watchlist */}
                        {!searchQuery && watchlistShows.length > 0 && (
                            <div>
                                <h3 className="text-lg font-bold text-zinc-100 mb-4 flex items-center gap-2">My Saved Watchlist</h3>
                                <div className="flex gap-4 overflow-x-auto pb-4 hide-scrollbar snap-x">
                                    {watchlistShows.map(show => <ShowCard key={show.id} show={show} onOpen={setSelectedShow} onPlay={setActiveVideo} onToggleList={toggleWatchlist} isListed={true} />)}
                                </div>
                            </div>
                        )}

                        {/* Category Rail Segment 2: All Synced Active Video Cards */}
                        {!searchQuery && shows.length > 0 && (
                            <div>
                                <h3 className="text-lg font-bold text-zinc-100 mb-4">Collective Lounge Streams</h3>
                                <div className="flex gap-4 overflow-x-auto pb-4 hide-scrollbar snap-x">
                                    {shows.map(show => <ShowCard key={show.id} show={show} onOpen={setSelectedShow} onPlay={setActiveVideo} onToggleList={toggleWatchlist} isListed={myList.includes(show.id)} />)}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* CREATIVE CINEMA STUDIO SLIDE-DRAWER PANEL */}
                    {isCreatorOpen && (
                        <div className="fixed inset-0 z-50 bg-black/70 backdrop-blur-xs flex justify-end">
                            <div className="w-full max-w-md bg-[#161616] h-full overflow-y-auto p-6 border-l border-zinc-800 shadow-2xl space-y-5">
                                <div className="flex items-center justify-between border-b border-zinc-800 pb-3">
                                    <h2 className="text-lg font-bold flex items-center gap-2">
                                        <svg className="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2z"></path></svg>
                                        Creative Cinema Studio
                                    </h2>
                                    <button onClick={() => setIsCreatorOpen(false)} className="text-zinc-400 hover:text-white text-sm uppercase font-bold tracking-wider font-mono">✕ Close</button>
                                </div>

                                <form onSubmit={handleCreateShow} className="space-y-4 text-xs">
                                    <div>
                                        <label className="block text-zinc-400 font-medium mb-1">Film / Series Title</label>
                                        <input type="text" placeholder="e.g., Star Wars: Rebirth" value={formTitle} onChange={(e) => setFormTitle(e.target.value)} required
                                               className="w-full bg-zinc-900 border border-zinc-700 rounded p-2.5 text-white" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-zinc-400 font-medium mb-1">Genre</label>
                                            <select value={formGenre} onChange={(e) => setFormGenre(e.target.value)}
                                                    className="w-full bg-zinc-900 border border-zinc-700 rounded p-2.5 text-white focus:outline-none">
                                                {['Sci-Fi', 'Action', 'Drama', 'Horror', 'Comedy', 'Documentary', 'Anime', 'Reality TV'].map(g => <option key={g} value={g}>{g}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-zinc-400 font-medium mb-1">Release Year</label>
                                            <input type="number" value={formYear} onChange={(e) => setFormYear(e.target.value)}
                                                   className="w-full bg-zinc-900 border border-zinc-700 rounded p-2.5 text-white" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 font-medium mb-1">Cover Image Link URL</label>
                                        <input type="url" placeholder="https://example.com/cover.png" value={formCoverUrl} onChange={(e) => setFormCoverUrl(e.target.value)}
                                               className="w-full bg-zinc-900 border border-zinc-700 rounded p-2.5 text-white font-mono" />
                                    </div>

                                    {/* CINEMA CONTROLLER: MOVIE SYNC SETTING */}
                                    <div className="p-3 bg-zinc-900 border border-zinc-800 rounded-lg space-y-3">
                                        <div className="flex items-center justify-between">
                                            <label className="block text-xs font-bold text-yellow-500 uppercase tracking-wider">Feature Film Media Stream</label>
                                            <span className="text-[8px] bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 px-2 py-0.5 rounded font-mono font-bold">CINEMA SYSTEM</span>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-2">
                                            <button
                                                type="button"
                                                onClick={() => setMovieSourceType("none")}
                                                className={`py-2 text-xs font-bold rounded-lg border transition ${movieSourceType === "none" ? "bg-zinc-800 border-zinc-700 text-white" : "bg-black/20 border-zinc-900 text-stone-500 hover:text-stone-300"}`}
                                            >
                                                Teaser Preview Only
                                            </button>
                                            <button
                                                type="button"
                                                onClick={() => setMovieSourceType("videoUrl")}
                                                className={`py-2 text-xs font-bold rounded-lg border transition ${movieSourceType === "videoUrl" ? "bg-yellow-500/10 border-yellow-500/25 text-yellow-400" : "bg-black/20 border-zinc-900 text-stone-500 hover:text-stone-300"}`}
                                            >
                                                Enable Full Feature Movie
                                            </button>
                                        </div>

                                        {movieSourceType === "videoUrl" && (
                                            <div className="space-y-1 pt-1.5">
                                                <label className="block text-[10px] font-bold text-zinc-400">Stream Source URL (YouTube, Vimeo, MP4 link, etc.)</label>
                                                <input 
                                                    type="url"
                                                    required
                                                    value={formFeatureUrl}
                                                    onChange={(e) => setFormFeatureUrl(e.target.value)}
                                                    placeholder="Direct MP4 link, Youtube link, Vimeo link..."
                                                    className="w-full bg-zinc-950 border border-zinc-700 rounded p-2.5 text-white font-mono"
                                                />
                                                <p className="text-[9px] text-zinc-400">Paste the video source link. Supports standard web links, YouTube, Vimeo, and direct MP4 streams.</p>
                                            </div>
                                        )}
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 font-medium mb-1">Promo Trailer URL (Optional)</label>
                                        <input type="url" placeholder="Youtube trailer teaser url..." value={formTrailerUrl} onChange={(e) => setFormTrailerUrl(e.target.value)}
                                               className="w-full bg-zinc-900 border border-zinc-700 rounded p-2.5 text-white font-mono" />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 font-medium mb-1">Cast Members (Comma separated)</label>
                                        <input type="text" placeholder="e.g., Mark Hamill, Carrie Fisher" value={formCast} onChange={(e) => setFormCast(e.target.value)}
                                               className="w-full bg-zinc-900 border border-zinc-700 rounded p-2.5 text-white" />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 font-medium mb-1">Plot Summary Description</label>
                                        <textarea rows="3" placeholder="Write a fascinating synopsis..." value={formDescription} onChange={(e) => setFormDescription(e.target.value)}
                                                  className="w-full bg-zinc-900 border border-zinc-700 rounded p-2.5 text-white resize-none"></textarea>
                                    </div>

                                    <button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition uppercase tracking-wider text-xs">
                                        Bake and Sync to Lounge
                                    </button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* EXPANDED SHOW CARD DETAIL MODAL OVERLAY */}
                    {selectedShow && (
                        <div className="fixed inset-0 z-50 bg-black/85 backdrop-blur-xs flex items-center justify-center p-4">
                            <div className="bg-[#181818] border border-zinc-800 rounded-2xl max-w-2xl w-full overflow-hidden shadow-2xl relative">
                                <button onClick={() => setSelectedShow(null)} className="absolute top-4 right-4 z-10 w-8 h-8 rounded-full bg-black/60 flex items-center justify-center text-white font-bold hover:bg-black transition">✕</button>
                                
                                <div className="h-56 relative">
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#181818] to-transparent z-10"></div>
                                    <img src={selectedShow.coverUrl} alt="Cover Image" className="w-full h-full object-cover opacity-40 object-center" />
                                    <div className="absolute bottom-4 left-6 z-20 space-y-1">
                                        <h2 className="text-2xl md:text-3xl font-bold">{selectedShow.title}</h2>
                                        <p className="text-xs text-zinc-400 font-mono font-medium">{selectedShow.genre} • {selectedShow.year}</p>
                                    </div>
                                </div>

                                <div className="p-6 space-y-4">
                                    <p className="text-zinc-300 text-xs md:text-sm leading-relaxed">{selectedShow.description}</p>
                                    {selectedShow.cast && selectedShow.cast.length > 0 && (
                                        <p className="text-xs text-zinc-400"><b className="text-zinc-300">Starring:</b> {selectedShow.cast.join(', ')}</p>
                                    )}
                                    <p className="text-[10px] text-zinc-500 font-mono">Synced database curator: <span className="text-zinc-400">{selectedShow.creator}</span></p>
                                    
                                    <div className="flex gap-2.5 pt-4 border-t border-zinc-900">
                                        {selectedShow.featureUrl && (
                                            <button onClick={() => { setActiveVideo({ url: selectedShow.featureUrl, title: selectedShow.title, type: 'Full Feature' }); setSelectedShow(null); }}
                                                    className="bg-white text-black font-bold text-xs px-5 py-2.5 rounded-lg hover:bg-zinc-200 transition active:scale-95">Play Full Feature</button>
                                        )}
                                        {selectedShow.trailerUrl && (
                                            <button onClick={() => { setActiveVideo({ url: selectedShow.trailerUrl, title: selectedShow.title, type: 'Trailer Teaser' }); setSelectedShow(null); }}
                                                    className="bg-zinc-800 text-white font-bold text-xs px-5 py-2.5 rounded-lg hover:bg-zinc-700 border border-zinc-700 transition active:scale-95">Play Promo Trailer</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LIGHTS-OUT DEDICATED STREAMING PLAYER THEATER OVERLAY */}
                    {activeVideo && (
                        <div className="fixed inset-0 z-50 bg-black flex flex-col justify-center items-center p-4">
                            <div className="w-full max-w-5xl flex flex-col space-y-3 h-full justify-center">
                                <div className="flex items-center justify-between px-2 text-xs">
                                    <div>
                                        <span className="text-[9px] uppercase font-mono tracking-widest text-zinc-400 bg-zinc-900 border border-zinc-800 px-2.5 py-1 rounded-md mr-3">{activeVideo.type}</span>
                                        <span className="font-semibold text-zinc-300 truncate max-w-[200px]">{activeVideo.title}</span>
                                    </div>
                                    <button onClick={() => setActiveVideo(null)} className="text-zinc-400 hover:text-white uppercase tracking-wider font-mono bg-zinc-900 px-3.5 py-1.5 rounded-md border border-zinc-800 transition active:scale-95">✕ Close Player</button>
                                </div>
                                <div className="w-full aspect-video bg-zinc-950 rounded-2xl overflow-hidden shadow-2xl border border-zinc-900">
                                    {renderVideoEmbed(activeVideo.url)}
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // --- SUB-COMPONENT: DISPLAY ITEM CARD ENTRY ---
        function ShowCard({ show, onOpen, onPlay, onToggleList, isListed }) {
            return (
                <div className="w-36 sm:w-44 md:w-48 shrink-0 snap-start bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 hover:border-zinc-500 transition-all group relative flex flex-col justify-between">
                    <div className="relative aspect-[2/3] w-full overflow-hidden bg-zinc-950">
                        <img src={show.coverUrl} alt={show.title} className="w-full h-full object-cover group-hover:scale-105 transition duration-300" />
                        
                        {/* Interactive fast badge overlay */}
                        <div className="absolute top-2.5 left-2.5 flex flex-col gap-1 z-10">
                            {show.featureUrl ? (
                                <span className="text-[8px] bg-yellow-500 text-black font-black uppercase px-2 py-0.5 rounded-md shadow shadow-black">Movie</span>
                            ) : (
                                <span className="text-[8px] bg-zinc-800 text-zinc-300 font-bold uppercase px-2 py-0.5 rounded-md border border-zinc-700 shadow shadow-black">Teaser</span>
                            )}
                        </div>
                    </div>
                    
                    <div className="p-3 flex-1 flex flex-col justify-between space-y-2 bg-[#181818]">
                        <div>
                            <h4 className="text-xs font-bold text-zinc-200 line-clamp-1 group-hover:text-white transition">{show.title}</h4>
                            <p className="text-[9px] text-zinc-500 font-mono mt-0.5">{show.genre} • {show.year}</p>
                        </div>
                        
                        <div className="flex gap-1.5 pt-2 border-t border-zinc-900/60 justify-between items-center text-[10px]">
                            <button onClick={() => onOpen(show)} className="text-zinc-400 hover:text-white transition font-medium">More Info</button>
                            <div className="flex gap-1.5 items-center">
                                <button onClick={() => onToggleList(show.id)} className="p-1 rounded bg-zinc-800 hover:bg-zinc-700 transition" title={isListed ? "Remove" : "Add to Watchlist"}>
                                    {isListed ? '❤️' : '➕'}
                                </button>
                                {show.featureUrl && (
                                    <button onClick={() => onPlay({ url: show.featureUrl, title: show.title, type: 'Full Feature' })} className="p-1 rounded bg-white hover:bg-zinc-200 transition" title="Play Movie">
                                        <svg className="w-3.5 h-3.5 fill-black" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render target tree
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
